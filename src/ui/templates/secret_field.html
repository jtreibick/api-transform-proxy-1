<div style="margin:14px 0;">
  <div style="font-weight:700;margin-bottom:6px;">{{label}}</div>
  <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
    <input id="{{id}}" type="password" value="{{value}}" readonly
      style="flex:1;min-width:320px;padding:10px 12px;border:1px solid #cbd5e1;border-radius:8px;font-family:ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, Liberation Mono, monospace;" />
    <button type="button" data-toggle-for="{{id}}" onclick="toggleSecret('{{id}}')"
      style="{{button_style}}"{{disabled_attr}}>Show</button>
    <button type="button" data-copy-for="{{id}}" onclick="copySecret('{{id}}')"
      style="{{button_style}}"{{disabled_attr}}>Copy</button>
  </div>
  {{note_block}}
</div>
